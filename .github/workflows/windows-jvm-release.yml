# Windows JVM 正式发布工作流：构建 Compose Desktop release MSI，并上传到 GitHub Release。
name: 发布 Windows JVM 正式应用

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 发布说明；留空时自动生成 Windows 端基础说明。
        required: false
        type: string
      prerelease:
        description: 是否标记为预发布版本。
        required: false
        default: false
        type: boolean

# 自动创建 tag 和上传 Release 资源需要 contents 写权限。
permissions:
  contents: write

# 同一分支同时触发多个端的正式发布时排队执行，避免 Release 文件互相覆盖。
concurrency:
  group: xymusic-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  windows-jvm-release:
    name: 构建并上传 Windows JVM 正式包
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      # 发布 tag 需要完整历史和 tag 信息，用于校验同名 tag 是否指向当前提交。
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 统一设置 JDK 21 和 Gradle 缓存，保持与 Android 发布 workflow 一致。
      - name: 设置 Gradle 环境
        uses: ./.github/actions/gradle-setup

      # Compose Desktop 生成 MSI 依赖 WiX Toolset，Windows runner 上显式安装。
      - name: 安装 WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          $wixBins = @(
            "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin",
            "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin",
            "${env:ProgramFiles}\WiX Toolset v3.14\bin"
          )
          foreach ($wixBin in $wixBins) {
            if (Test-Path $wixBin) {
              $wixBin | Out-File -FilePath $env:GITHUB_PATH -Append
            }
          }

      # tag 使用版本目录中的 app-versionName，保证 Windows 包与应用版本一致。
      - name: 解析正式发布版本
        id: release_meta
        shell: pwsh
        run: |
          $versionText = Get-Content -Path "gradle/libs.versions.toml" -Raw
          $versionNameMatch = [regex]::Match($versionText, '(?m)^app-versionName\s*=\s*"([^"]+)"')
          $versionCodeMatch = [regex]::Match($versionText, '(?m)^app-versionCode\s*=\s*"([^"]+)"')
          if (-not $versionNameMatch.Success -or -not $versionCodeMatch.Success) {
            Write-Error "无法从 gradle/libs.versions.toml 读取 app-versionName 或 app-versionCode"
            exit 1
          }
          $versionName = $versionNameMatch.Groups[1].Value
          $versionCode = $versionCodeMatch.Groups[1].Value
          $tagName = "v$versionName"
          "version_name=$versionName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version_code=$versionCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # 这里明确构建 release MSI，不运行 dev/run/hot reload 或测试任务。
      - name: 构建 Windows release MSI
        shell: pwsh
        run: |
          .\gradlew.bat --no-daemon :desktopApp:packageReleaseMsi --stacktrace
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      # 发布前重命名 MSI 并生成 SHA256，便于 GitHub Release 下载列表识别。
      - name: 整理 Windows 正式包产物
        shell: pwsh
        env:
          VERSION_NAME: ${{ steps.release_meta.outputs.version_name }}
        run: |
          New-Item -ItemType Directory -Force -Path "release-artifacts" | Out-Null
          $msiFile = Get-ChildItem -Path "desktopApp/build/compose/binaries/main-release/msi" -Filter "*.msi" -File | Sort-Object Name | Select-Object -First 1
          if (-not $msiFile) {
            Write-Error "未找到 Windows release MSI 产物"
            exit 1
          }
          $targetFile = "release-artifacts/XyMusic-$env:VERSION_NAME-windows-x64.msi"
          Copy-Item -Path $msiFile.FullName -Destination $targetFile -Force
          Get-FileHash -Algorithm SHA256 -Path "release-artifacts/*" |
            ForEach-Object { "$($_.Hash.ToLower())  $([System.IO.Path]::GetFileName($_.Path))" } |
            Set-Content -Path "release-artifacts/SHA256SUMS-windows.txt"

      # Actions artifact 保留一份 Windows 端构建产物，方便排查 Release 上传失败的情况。
      - name: 上传 Actions 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-jvm-release-${{ steps.release_meta.outputs.version_name }}
          path: release-artifacts/*
          if-no-files-found: error

      # gh release create 会在 tag 不存在时基于当前提交自动创建 tag，并上传 Windows 正式包。
      - name: 创建 GitHub Release 并上传 Windows 正式包
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
          RELEASE_TITLE: XyMusic ${{ steps.release_meta.outputs.tag_name }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
          IS_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          git fetch --tags --force
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          git rev-parse "refs/tags/$env:TAG_NAME" *> $null
          if ($LASTEXITCODE -eq 0) {
            $tagCommit = git rev-list -n 1 "refs/tags/$env:TAG_NAME"
            $headCommit = git rev-parse HEAD
            if ($tagCommit -ne $headCommit) {
              Write-Error "$env:TAG_NAME 已存在，但不是当前提交。请先提升 app-versionName，或确认旧 tag 后再重新发布。"
              exit 1
            }
          }

          $releaseFiles = Get-ChildItem -Path "release-artifacts" -File | Sort-Object Name | ForEach-Object { $_.FullName }
          if (-not $releaseFiles) {
            Write-Error "没有可上传到 GitHub Release 的 Windows 正式产物"
            exit 1
          }

          $notesFile = Join-Path $env:RUNNER_TEMP "windows-release-notes.md"
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_NOTES)) {
            "XyMusic $env:TAG_NAME Windows JVM 正式构建。`n`n- Windows release MSI`n- SHA256SUMS-windows.txt 校验文件" | Set-Content -Path $notesFile
          } else {
            $env:RELEASE_NOTES | Set-Content -Path $notesFile
          }

          $prereleaseArgs = @()
          if ($env:IS_PRERELEASE -eq "true") {
            $prereleaseArgs += "--prerelease"
          }

          gh release view $env:TAG_NAME *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG_NAME @releaseFiles --clobber
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          } else {
            gh release create $env:TAG_NAME @releaseFiles --target $env:GITHUB_SHA --title $env:RELEASE_TITLE --notes-file $notesFile @prereleaseArgs
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }
