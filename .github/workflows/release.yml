# 正式发布工作流：并行构建 Android APK/AAB 和 Windows JVM MSI，并统一上传到 GitHub Release。
name: 发布正式应用

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 发布说明；留空时自动生成基础说明。
        required: false
        type: string
      prerelease:
        description: 是否标记为预发布版本。
        required: false
        default: false
        type: boolean

# 自动创建 tag 和上传 Release 资源需要 contents 写权限。
permissions:
  contents: write

# 同一分支的正式发布排队执行，避免同一个 tag 或 Release 被并发修改。
concurrency:
  group: xymusic-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release-meta:
    name: 解析正式发布版本
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version_name: ${{ steps.release_meta.outputs.version_name }}
      version_code: ${{ steps.release_meta.outputs.version_code }}
      tag_name: ${{ steps.release_meta.outputs.tag_name }}

    steps:
      # 发布 tag 需要完整历史和 tag 信息，用于校验同名 tag 是否指向当前提交。
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # tag 使用版本目录中的 app-versionName，保证 GitHub Release 与应用版本一致。
      - name: 解析正式发布版本
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          version_name="$(awk -F '"' '/^app-versionName[[:space:]]*=/{ print $2; exit }' gradle/libs.versions.toml)"
          version_code="$(awk -F '"' '/^app-versionCode[[:space:]]*=/{ print $2; exit }' gradle/libs.versions.toml)"
          if [ -z "$version_name" ] || [ -z "$version_code" ]; then
            echo "::error::无法从 gradle/libs.versions.toml 读取 app-versionName 或 app-versionCode"
            exit 1
          fi
          tag_name="v${version_name}"
          git fetch --tags --force
          if git rev-parse "refs/tags/${tag_name}" > /dev/null 2>&1; then
            tag_commit="$(git rev-list -n 1 "refs/tags/${tag_name}")"
            head_commit="$(git rev-parse HEAD)"
            if [ "$tag_commit" != "$head_commit" ]; then
              echo "::error::${tag_name} 已存在，但不是当前提交。请先提升 app-versionName，或确认旧 tag 后再重新发布。"
              exit 1
            fi
          fi
          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "version_code=${version_code}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

  android-release:
    name: 构建 Android 正式包
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: release-meta

    steps:
      # Android 正式包需要源码和完整 Gradle 配置。
      - name: 拉取源码
        uses: actions/checkout@v4

      # 统一设置 JDK 21 和 Gradle 缓存，保持与 KMP 官方文档的拆分方式一致。
      - name: 设置 Gradle 环境
        uses: ./.github/actions/gradle-setup

      # compileSdk=36 的 Android SDK 在 runner 上不一定预装，发布前显式安装。
      - name: 安装 Android SDK
        shell: bash
        run: |
          set -euo pipefail
          # GitHub-hosted runner 会预装 Android SDK，但不保证把 sdkmanager 放进 PATH。
          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$sdk_root" ]; then
            echo "::error::未找到 ANDROID_SDK_ROOT 或 ANDROID_HOME，无法定位 Android SDK"
            exit 1
          fi

          # 优先使用 cmdline-tools/latest/bin/sdkmanager；若镜像布局变化，则回退到实际存在的 bin/sdkmanager。
          sdkmanager_bin=""
          for candidate in \
            "$sdk_root/cmdline-tools/latest/bin/sdkmanager" \
            "$sdk_root/cmdline-tools/bin/sdkmanager"; do
            if [ -x "$candidate" ]; then
              sdkmanager_bin="$candidate"
              break
            fi
          done
          if [ -z "$sdkmanager_bin" ]; then
            sdkmanager_bin="$(find "$sdk_root/cmdline-tools" -type f -path '*/bin/sdkmanager' | sort | head -n 1 || true)"
          fi
          if [ -z "$sdkmanager_bin" ]; then
            echo "::error::未在 $sdk_root 下找到 sdkmanager，请检查 runner Android cmdline-tools 安装状态"
            exit 1
          fi

          # 显式传入 --sdk_root，避免 sdkmanager 因非默认安装位置误判 SDK 根目录。
          yes | "$sdkmanager_bin" --sdk_root="$sdk_root" --licenses > /dev/null || true
          "$sdkmanager_bin" --sdk_root="$sdk_root" "platforms;android-36" "build-tools;36.0.0"

      # 正式包必须使用 release keystore；缺少任何 Secret 都直接失败，避免生成测试/未签名产物。
      - name: 还原 Android 正式签名文件
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          [ -n "$ANDROID_RELEASE_KEYSTORE_BASE64" ] || missing+=("KEYSTORE_BASE64")
          [ -n "$ANDROID_RELEASE_KEYSTORE_PASSWORD" ] || missing+=("KEYSTORE_PASSWORD")
          [ -n "$ANDROID_RELEASE_KEY_ALIAS" ] || missing+=("KEY_ALIAS")
          [ -n "$ANDROID_RELEASE_KEY_PASSWORD" ] || missing+=("KEY_PASSWORD")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::缺少 GitHub Secrets: ${missing[*]}"
            exit 1
          fi
          keystore_path="$RUNNER_TEMP/xymusic-release.jks"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "ANDROID_RELEASE_KEYSTORE_PATH=${keystore_path}" >> "$GITHUB_ENV"

      # 这里明确构建 release APK/AAB，不构建 debug 包、androidTest 包或测试应用。
      - name: 构建 Android release APK 和 AAB
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon :androidApp:assembleRelease :androidApp:bundleRelease --stacktrace

      # 发布前校验并重命名正式产物，便于 GitHub Release 下载列表识别。
      - name: 整理 Android 正式包产物
        shell: bash
        env:
          VERSION_NAME: ${{ needs.release-meta.outputs.version_name }}
          VERSION_CODE: ${{ needs.release-meta.outputs.version_code }}
        run: |
          set -euo pipefail
          mkdir -p android-release-artifacts
          apk_file="$(find androidApp/build/outputs/apk/release -type f -name '*.apk' | sort | head -n 1)"
          aab_file="$(find androidApp/build/outputs/bundle/release -type f -name '*.aab' | sort | head -n 1)"
          if [ -z "$apk_file" ] || [ -z "$aab_file" ]; then
            echo "::error::未找到 release APK 或 AAB 产物"
            exit 1
          fi
          # APK 的 minSdk 为 28，apksigner 返回 0 即表示当前安装范围内签名有效；v1/v3/v4 为 false 不单独视为失败。
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose "$apk_file"
          # AAB 使用 JAR 签名；Android 上传密钥通常是自签证书，jarsigner -strict 会把正常证书警告升级为退出码 4。
          if ! aab_verify_output="$(jarsigner -verify "$aab_file" 2>&1)"; then
            printf '%s\n' "$aab_verify_output"
            echo "::error::AAB 签名校验命令执行失败"
            exit 1
          fi
          printf '%s\n' "$aab_verify_output"
          if [[ "$aab_verify_output" != *"jar verified."* ]]; then
            echo "::error::AAB 未通过 JAR 签名校验"
            exit 1
          fi
          cp "$apk_file" "android-release-artifacts/XyMusic-${VERSION_NAME}-${VERSION_CODE}-release.apk"
          cp "$aab_file" "android-release-artifacts/XyMusic-${VERSION_NAME}-${VERSION_CODE}-release.aab"
          (cd android-release-artifacts && sha256sum * > SHA256SUMS-android.txt)

      # Actions artifact 保留一份 Android 端构建产物，方便排查 Release 上传失败的情况。
      - name: 上传 Android Actions 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ needs.release-meta.outputs.version_name }}-${{ needs.release-meta.outputs.version_code }}
          path: android-release-artifacts/*
          if-no-files-found: error

      # 正式签名文件只在 runner 临时目录短暂存在，任务结束前主动删除。
      - name: 清理 Android 正式签名文件
        if: always()
        shell: bash
        run: |
          if [ -n "${ANDROID_RELEASE_KEYSTORE_PATH:-}" ]; then
            rm -f "$ANDROID_RELEASE_KEYSTORE_PATH"
          fi

  windows-jvm-release:
    name: 构建 Windows JVM 正式包
    runs-on: windows-latest
    timeout-minutes: 90
    needs: release-meta

    steps:
      # Windows JVM 正式包需要源码和完整 Gradle 配置。
      - name: 拉取源码
        uses: actions/checkout@v4

      # 统一设置 JDK 21 和 Gradle 缓存，保持与 Android 发布流程一致。
      - name: 设置 Gradle 环境
        uses: ./.github/actions/gradle-setup

      # Compose Desktop 生成 MSI 依赖 WiX Toolset，Windows runner 上显式安装。
      - name: 安装 WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          $wixBins = @(
            "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin",
            "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin",
            "${env:ProgramFiles}\WiX Toolset v3.14\bin"
          )
          foreach ($wixBin in $wixBins) {
            if (Test-Path $wixBin) {
              $wixBin | Out-File -FilePath $env:GITHUB_PATH -Append
            }
          }

      # 这里明确构建 release MSI，不运行 dev/run/hot reload 或测试任务。
      - name: 构建 Windows release MSI
        shell: pwsh
        run: |
          .\gradlew.bat --no-daemon :desktopApp:packageReleaseMsi --stacktrace
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      # 发布前重命名 MSI 并生成 SHA256，便于 GitHub Release 下载列表识别。
      - name: 整理 Windows 正式包产物
        shell: pwsh
        env:
          VERSION_NAME: ${{ needs.release-meta.outputs.version_name }}
        run: |
          New-Item -ItemType Directory -Force -Path "windows-release-artifacts" | Out-Null
          $msiFile = Get-ChildItem -Path "desktopApp/build/compose/binaries/main-release/msi" -Filter "*.msi" -File | Sort-Object Name | Select-Object -First 1
          if (-not $msiFile) {
            Write-Error "未找到 Windows release MSI 产物"
            exit 1
          }
          $targetFile = "windows-release-artifacts/XyMusic-$env:VERSION_NAME-windows-x64.msi"
          Copy-Item -Path $msiFile.FullName -Destination $targetFile -Force
          Get-FileHash -Algorithm SHA256 -Path "windows-release-artifacts/*" |
            ForEach-Object { "$($_.Hash.ToLower())  $([System.IO.Path]::GetFileName($_.Path))" } |
            Set-Content -Path "windows-release-artifacts/SHA256SUMS-windows.txt"

      # Actions artifact 保留一份 Windows 端构建产物，方便排查 Release 上传失败的情况。
      - name: 上传 Windows Actions 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-jvm-release-${{ needs.release-meta.outputs.version_name }}
          path: windows-release-artifacts/*
          if-no-files-found: error

  github-release:
    name: 创建 GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - release-meta
      - android-release
      - windows-jvm-release

    steps:
      # Release 需要完整 tag 信息，用于复用或创建当前版本。
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 汇总 Android 与 Windows 构建产物，最终统一上传到一个 GitHub Release。
      - name: 下载 Android Actions 构建产物
        uses: actions/download-artifact@v4
        with:
          name: android-release-${{ needs.release-meta.outputs.version_name }}-${{ needs.release-meta.outputs.version_code }}
          path: release-artifacts

      # 汇总 Android 与 Windows 构建产物，最终统一上传到一个 GitHub Release。
      - name: 下载 Windows Actions 构建产物
        uses: actions/download-artifact@v4
        with:
          name: windows-jvm-release-${{ needs.release-meta.outputs.version_name }}
          path: release-artifacts

      # gh release create 会在 tag 不存在时基于当前提交自动创建 tag，并上传全部正式包。
      - name: 创建 GitHub Release 并上传正式包
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-meta.outputs.tag_name }}
          RELEASE_TITLE: XyMusic ${{ needs.release-meta.outputs.tag_name }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
          IS_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          if git rev-parse "refs/tags/${TAG_NAME}" > /dev/null 2>&1; then
            tag_commit="$(git rev-list -n 1 "refs/tags/${TAG_NAME}")"
            head_commit="$(git rev-parse HEAD)"
            if [ "$tag_commit" != "$head_commit" ]; then
              echo "::error::${TAG_NAME} 已存在，但不是当前提交。请先提升 app-versionName，或确认旧 tag 后再重新发布。"
              exit 1
            fi
          fi

          mapfile -t release_files < <(find release-artifacts -maxdepth 1 -type f | sort)
          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "::error::没有可上传到 GitHub Release 的正式产物"
            exit 1
          fi

          notes_file="$RUNNER_TEMP/release-notes.md"
          if [ -n "$RELEASE_NOTES" ]; then
            printf '%s\n' "$RELEASE_NOTES" > "$notes_file"
          else
            printf 'XyMusic %s 正式构建。\n\n- Android release APK\n- Android release AAB\n- Windows release MSI\n- SHA256SUMS-android.txt 和 SHA256SUMS-windows.txt 校验文件\n' "$TAG_NAME" > "$notes_file"
          fi

          prerelease_args=()
          if [ "$IS_PRERELEASE" = "true" ]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "$TAG_NAME" > /dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${release_files[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${release_files[@]}" --target "$GITHUB_SHA" --title "$RELEASE_TITLE" --notes-file "$notes_file" "${prerelease_args[@]}"
          fi
