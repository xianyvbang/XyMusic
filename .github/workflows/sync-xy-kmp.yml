name: Sync to XyMusic xy-kmp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate target token
        env:
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          if [ -z "${TARGET_REPO_TOKEN}" ]; then
            echo "TARGET_REPO_TOKEN is not configured."
            exit 1
          fi

      - name: Add target remote
        env:
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          git config --global --unset-all http.https://github.com/.extraheader || true
          git remote add target https://x-access-token:${TARGET_REPO_TOKEN}@github.com/xianyvbang/XyMusic.git
          git fetch target xy-kmp

      - name: Prepare target branch snapshot
        run: |
          git worktree add --detach "$RUNNER_TEMP/xy-kmp-sync" HEAD
          cd "$RUNNER_TEMP/xy-kmp-sync"
          rm -rf .github/workflows
          if ! git diff --quiet --exit-code; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Prepare xy-kmp sync snapshot"
          fi

      - name: Force sync main to xy-kmp
        run: |
          cd "$RUNNER_TEMP/xy-kmp-sync"
          git push --force-with-lease target HEAD:refs/heads/xy-kmp
